# Build, test, and publish a final release to PyPI on `v*` tags (excluding `*rc*`).
#
# Trigger: push a tag like `v0.1.0`, `v1.2.3`, `v2.0.0`. Release candidates (tags containing
# `rc`) are handled by `rc-publish.yml`.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   PYPI_TOKEN     — a PyPI API token scoped to the `middleware-llmobs` project. Used as the
#                    password with the username `__token__` (PyPI standard).
#   PYPI_USERNAME  — kept available for legacy username/password auth; not used by default.
#   PYPI_PASSWORD  — same as above.

name: release

on:
  push:
    tags:
      - "v*"          # match every `v*` tag…
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # …and skip in the test job too if the tag is an rc, so the rc workflow owns that path.
    if: github.event_name == 'workflow_dispatch' || !contains(github.ref_name, 'rc')
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff mypy

      - name: ruff (lint + format check)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: mypy
        run: mypy src/middleware/llmobs

      - name: pytest
        run: pytest -q

  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.ref_name, 'rc')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Verify tag matches package version
        # The tag is the source of truth for the release version. Make sure pyproject's
        # static version agrees so we don't accidentally ship the wrong number.
        run: |
          TAG="${GITHUB_REF_NAME#v}"  # v0.1.0 -> 0.1.0
          PKG="$(hatch version)"
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag ($TAG) and pyproject version ($PKG) must match"
            exit 1
          fi
        if: github.event_name == 'push'

      - name: Build
        run: hatch build -t sdist -t wheel

      - name: Upload dist/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on real tag pushes (skip workflow_dispatch and any rc-tagged push).
    if: >-
      github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(github.ref_name, 'rc')
    steps:
      - name: Download dist/
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          # No `skip-existing` here — a duplicate final-release push should be a loud failure,
          # not a silent no-op (unlike rc re-pushes, where it's a convenience).
